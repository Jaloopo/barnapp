<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Barnappen — Kunskapskarta</title>
<style>
  :root {
    --c-bg: #f4f8fb;
    --c-text: #1a2a3a;
    --c-muted: #6b7f90;
    --c-kemi: #66bb6a;
    --c-kemi-bg: #e8f5e9;
    --c-kemi-dark: #388e3c;
    --c-el: #ffc107;
    --c-el-bg: #fff8e1;
    --c-el-dark: #f57f17;
    --c-astro: #9575cd;
    --c-astro-bg: #ede7f6;
    --c-astro-dark: #512da8;
    --c-kommande-bg: #f0f0f0;
    --c-kommande-border: #ddd;
    --node-w: 140px;
    --node-h: 80px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: var(--c-bg);
    color: var(--c-text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px 48px;
  }
  h1 {
    font-size: clamp(1.5rem, 4vw, 2.2rem);
    font-weight: 800;
    margin-bottom: 8px;
    text-align: center;
  }
  .subtitle {
    color: var(--c-muted);
    font-size: clamp(0.95rem, 2.5vw, 1.1rem);
    margin-bottom: 32px;
    text-align: center;
  }

  /* ── Map container ── */
  .map-container {
    position: relative;
    width: 100%;
    max-width: 800px;
    aspect-ratio: 4 / 3;
    margin-bottom: 32px;
  }
  .map-lines {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    overflow: visible;
  }
  .map-nodes {
    position: absolute;
    inset: 0;
  }

  /* ── Nodes ── */
  .node {
    position: absolute;
    width: var(--node-w);
    height: var(--node-h);
    transform: translate(-50%, -50%);
    border-radius: 14px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    text-decoration: none;
    color: var(--c-text);
    transition: transform 0.15s ease, box-shadow 0.15s ease;
    cursor: pointer;
  }
  .node-icon { font-size: 26px; line-height: 1; }
  .node-title { font-size: 0.82rem; font-weight: 700; text-align: center; line-height: 1.2; }
  .node-check {
    position: absolute;
    top: 6px; right: 8px;
    font-size: 0.75rem;
    font-weight: 700;
    color: #2e7d32;
  }

  /* ── Node status styles ── */
  .node.status-klar {
    background: var(--node-accent, #e8f5e9);
    border: 2px solid var(--node-border, #66bb6a);
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  }
  .node.status-byggd {
    background: var(--node-bg-light, #f1f8e9);
    border: 2px solid var(--node-accent, #66bb6a);
  }
  .node.status-design {
    background: #fff;
    border: 2px dashed var(--node-accent, #aaa);
    opacity: 0.8;
  }
  .node.status-kommande {
    background: var(--c-kommande-bg);
    border: 1px solid var(--c-kommande-border);
    opacity: 0.5;
    cursor: default;
  }

  /* ── Subject colors ── */
  .ämne-kemi { --node-accent: #66bb6a; --node-border: #388e3c; --node-bg-light: #e8f5e9; }
  .ämne-el   { --node-accent: #ffc107; --node-border: #f57f17; --node-bg-light: #fff8e1; }
  .ämne-astro { --node-accent: #9575cd; --node-border: #512da8; --node-bg-light: #ede7f6; }

  .ämne-kemi.status-klar  { background: #66bb6a; color: #fff; }
  .ämne-el.status-klar    { background: #ffc107; color: #3e2800; }
  .ämne-astro.status-klar { background: #9575cd; color: #fff; }
  .ämne-kemi.status-klar .node-check  { color: #fff; }
  .ämne-astro.status-klar .node-check { color: #fff; }

  /* ── Hover/focus ── */
  a.node:hover, a.node:focus-visible {
    transform: translate(-50%, -50%) translateY(-3px);
    box-shadow: 0 6px 18px rgba(0,0,0,0.15);
    outline: none;
  }
  a.node:focus-visible {
    outline: 3px solid #1a73e8;
    outline-offset: 3px;
  }
  a.node:active {
    transform: translate(-50%, -50%) translateY(0);
  }

  /* ── "Börja här" ── */
  .node.start-node {
    z-index: 2;
  }
  .start-badge {
    position: absolute;
    top: -30px;
    left: 50%;
    transform: translateX(-50%);
    background: #ff7043;
    color: #fff;
    font-size: 0.72rem;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 20px;
    white-space: nowrap;
    pointer-events: none;
  }
  .start-badge::after {
    content: '';
    position: absolute;
    bottom: -5px;
    left: 50%;
    transform: translateX(-50%);
    border: 5px solid transparent;
    border-top-color: #ff7043;
    border-bottom: none;
  }
  @keyframes pulse-ring {
    0%   { box-shadow: 0 0 0 0 rgba(255, 112, 67, 0.5), 0 2px 8px rgba(0,0,0,0.08); }
    70%  { box-shadow: 0 0 0 10px rgba(255, 112, 67, 0), 0 2px 8px rgba(0,0,0,0.08); }
    100% { box-shadow: 0 0 0 0 rgba(255, 112, 67, 0), 0 2px 8px rgba(0,0,0,0.08); }
  }
  .node.start-node {
    animation: pulse-ring 2s ease-out infinite;
  }

  /* ── node-soon label ── */
  .node-soon {
    font-size: 0.65rem;
    font-weight: 600;
    color: #9e9e9e;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  /* ── Legend ── */
  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 16px;
    justify-content: center;
    font-size: 0.82rem;
    color: var(--c-muted);
    margin-top: 8px;
  }
  .legend-item { display: flex; align-items: center; gap: 6px; }
  .legend-dot {
    width: 14px; height: 14px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* ── Responsive ── */
  @media (max-width: 480px) {
    :root { --node-w: 110px; --node-h: 65px; }
    .map-container { aspect-ratio: 3 / 4; }
    .node-icon { font-size: 20px; }
    .node-title { font-size: 0.72rem; }
    .start-badge { font-size: 0.65rem; top: -26px; }
  }

  /* ── Reduced motion ── */
  @media (prefers-reduced-motion: reduce) {
    .node.start-node { animation: none; }
    a.node { transition: none; }
    a.node:hover { transform: translate(-50%, -50%); }
  }
</style>
</head>
<body>

<h1>Barnappen</h1>
<p class="subtitle">Utforska naturvetenskap — välj din väg!</p>

<div class="map-container">
  <svg class="map-lines" aria-hidden="true"></svg>
  <div class="map-nodes"></div>
</div>

<div class="legend">
  <div class="legend-item">
    <div class="legend-dot" style="background:#66bb6a"></div>
    <span>Klar</span>
  </div>
  <div class="legend-item">
    <div class="legend-dot" style="background:#a5d6a7; border: 2px solid #66bb6a"></div>
    <span>Redo att testa</span>
  </div>
  <div class="legend-item">
    <div class="legend-dot" style="background:#f0f0f0; border: 2px solid #ddd; opacity:0.8"></div>
    <span>Kommer snart</span>
  </div>
</div>

<script>
const appar = [
  {
    id: 'kemi-1-atomer',
    titel: 'Atomer',
    desc: 'Protoner bestämmer ämnet',
    ämne: 'kemi',
    icon: '⚛',
    status: 'klar',
    href: 'kemi/kemi-1-atomer/',
    prerequisites: [],
    unlocks: ['kemi-2-molekyler', 'el-1-ledare', 'astro-1-fusion'],
    x: 0.5, y: 0.08
  },
  {
    id: 'kemi-2-molekyler',
    titel: 'Molekyler',
    desc: 'Atomer sätter ihop sig',
    ämne: 'kemi',
    icon: '🧪',
    status: 'klar',
    href: 'kemi/kemi-2-molekyler/',
    prerequisites: ['kemi-1-atomer'],
    unlocks: ['astro-1-fusion', 'kemi-3-blandningar'],
    x: 0.18, y: 0.40
  },
  {
    id: 'el-1-ledare',
    titel: 'Ledare',
    desc: 'Kan elektronen hoppa?',
    ämne: 'el',
    icon: '⚡',
    status: 'byggd',
    href: 'el/el-1-ledare/',
    prerequisites: ['kemi-1-atomer'],
    unlocks: ['el-2-kretsar'],
    x: 0.50, y: 0.40
  },
  {
    id: 'astro-1-fusion',
    titel: 'Stjärnköket',
    desc: 'Väte blir helium',
    ämne: 'astro',
    icon: '⭐',
    status: 'byggd',
    href: 'astro/astro-1-fusion/',
    prerequisites: ['kemi-1-atomer'],
    unlocks: ['astro-2-livscykel'],
    x: 0.82, y: 0.40
  },
  {
    id: 'kemi-3-blandningar',
    titel: 'Blandningar',
    desc: 'Kommer snart',
    ämne: 'kemi',
    icon: '🫙',
    status: 'kommande',
    href: null,
    prerequisites: ['kemi-2-molekyler'],
    unlocks: [],
    x: 0.18, y: 0.72
  },
  {
    id: 'el-2-kretsar',
    titel: 'Spänning',
    desc: 'Vad driver strömmen?',
    ämne: 'el',
    icon: '🔋',
    status: 'byggd',
    href: 'el/el-2-kretsar/',
    prerequisites: ['el-1-ledare'],
    unlocks: [],
    x: 0.50, y: 0.72
  },
  {
    id: 'astro-2-livscykel',
    titel: 'Livscykeln',
    desc: 'Kommer snart',
    ämne: 'astro',
    icon: '🌌',
    status: 'kommande',
    href: null,
    prerequisites: ['astro-1-fusion'],
    unlocks: [],
    x: 0.82, y: 0.72
  }
];

const nodeEls = {};

function render() {
  const container = document.querySelector('.map-nodes');
  container.innerHTML = '';

  // Sort for tab order: top-to-bottom, left-to-right
  const sorted = [...appar].sort((a, b) => a.y !== b.y ? a.y - b.y : a.x - b.x);

  sorted.forEach((app, i) => {
    const isClickable = app.status !== 'kommande' && app.href;
    const el = document.createElement(isClickable ? 'a' : 'div');

    el.className = `node ämne-${app.ämne} status-${app.status}`;
    if (isClickable) {
      el.href = app.href;
    } else {
      el.setAttribute('aria-disabled', 'true');
      el.setAttribute('role', 'img');
      el.setAttribute('aria-label', `${app.titel} — Kommer snart`);
    }

    el.style.left = (app.x * 100) + '%';
    el.style.top  = (app.y * 100) + '%';
    el.tabIndex = isClickable ? 0 : -1;

    // "Börja här" wrapper + badge
    if (app.prerequisites.length === 0 && app.status !== 'kommande') {
      el.classList.add('start-node');
      const badge = document.createElement('span');
      badge.className = 'start-badge';
      badge.textContent = 'Börja här!';
      badge.setAttribute('aria-hidden', 'true');
      el.appendChild(badge);
    }

    const icon = document.createElement('span');
    icon.className = 'node-icon';
    icon.setAttribute('aria-hidden', 'true');
    icon.textContent = app.icon;
    el.appendChild(icon);

    const title = document.createElement('span');
    title.className = 'node-title';
    title.textContent = app.titel;
    el.appendChild(title);

    if (app.status === 'klar') {
      const check = document.createElement('span');
      check.className = 'node-check';
      check.setAttribute('aria-label', 'Klar');
      check.textContent = '✓';
      el.appendChild(check);
    }

    if (app.status === 'kommande') {
      const soon = document.createElement('span');
      soon.className = 'node-soon';
      soon.setAttribute('aria-hidden', 'true');
      soon.textContent = 'Snart';
      el.appendChild(soon);
    }

    container.appendChild(el);
    nodeEls[app.id] = el;
  });
}

function drawLines() {
  const svg = document.querySelector('.map-lines');
  const container = document.querySelector('.map-container');
  svg.innerHTML = '';

  const cw = container.offsetWidth;
  const ch = container.offsetHeight;

  appar.forEach(app => {
    app.unlocks.forEach(unlockId => {
      const toApp = appar.find(a => a.id === unlockId);
      if (!toApp) return;

      const x1 = app.x * cw;
      const y1 = app.y * ch;
      const x2 = toApp.x * cw;
      const y2 = toApp.y * ch;

      const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      line.setAttribute('x1', x1);
      line.setAttribute('y1', y1);
      line.setAttribute('x2', x2);
      line.setAttribute('y2', y2);
      line.setAttribute('stroke-width', '2.5');

      const colors = { kemi: '#66bb6a', el: '#ffc107', astro: '#9575cd' };
      line.setAttribute('stroke', colors[toApp.ämne] || '#aaa');

      if (toApp.status === 'kommande') {
        line.setAttribute('stroke-dasharray', '6 4');
        line.setAttribute('stroke-opacity', '0.4');
      } else {
        line.setAttribute('stroke-opacity', '0.7');
      }

      svg.appendChild(line);
    });
  });
}

render();
drawLines();

const observer = new ResizeObserver(() => drawLines());
observer.observe(document.querySelector('.map-container'));
</script>

</body>
</html>
