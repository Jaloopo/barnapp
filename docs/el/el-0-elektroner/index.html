<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Elektroner på utsidan</title>
  <link rel="icon" href="data:,">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    :root {
      --bg: #f6efe1;
      --bg-deep: #eadfc8;
      --panel: rgba(255, 251, 243, 0.92);
      --panel-strong: #fff9ef;
      --text: #30251d;
      --muted: #6f6256;
      --line: rgba(125, 96, 49, 0.18);
      --shadow: 0 20px 46px rgba(111, 86, 51, 0.14), 0 6px 18px rgba(111, 86, 51, 0.08);
      --gold: #e0b12f;
      --gold-soft: #f6e7b6;
      --gold-deep: #8b6b15;
      --copper: #d06e4d;
      --copper-deep: #9f412c;
      --outer: rgba(255, 224, 143, 0.28);
      --blue: #4b86d8;
      --blue-soft: #dce8fb;
      --success: #3f8c5a;
      --success-soft: #ddefe1;
      --warn: #c06b2f;
      --warn-soft: #f8e5d4;
      --danger: #dc8b4c;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      font-family: "Nunito", sans-serif;
      background:
        radial-gradient(circle at top, rgba(255, 250, 240, 0.96), transparent 42%),
        linear-gradient(180deg, var(--bg) 0%, #efe4cc 100%);
      color: var(--text);
    }

    body {
      overflow-x: hidden;
    }

    button,
    input {
      font: inherit;
    }

    button {
      border: none;
      cursor: pointer;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    #root {
      min-height: 100vh;
    }

    @keyframes rise {
      from {
        opacity: 0;
        transform: translateY(18px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes pulseGlow {
      0%,
      100% {
        transform: scale(1);
        box-shadow: 0 0 0 0 rgba(224, 177, 47, 0.2);
      }
      50% {
        transform: scale(1.04);
        box-shadow: 0 0 0 14px rgba(224, 177, 47, 0);
      }
    }

    @keyframes softShake {
      0%,
      100% {
        transform: translateX(0);
      }
      25% {
        transform: translateX(-6px);
      }
      75% {
        transform: translateX(6px);
      }
    }

    @keyframes floatDot {
      0%,
      100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-5px);
      }
    }

    @keyframes progressPop {
      0% {
        transform: scale(0.92);
      }
      100% {
        transform: scale(1);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation: none !important;
        transition: none !important;
        scroll-behavior: auto !important;
      }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useEffect, useRef, useState } = React;

    const TOTAL_STEPS = 7;

    function clamp(value, min, max) {
      return Math.min(max, Math.max(min, value));
    }

    function playSound(type) {
      try {
        const AudioCtx = window.AudioContext || window.webkitAudioContext;
        const context = new AudioCtx();
        const master = context.createGain();
        master.gain.value = 0.14;
        master.connect(context.destination);

        const note = (frequency, start, duration, kind = "sine", volume = 0.3) => {
          const oscillator = context.createOscillator();
          const gain = context.createGain();
          oscillator.type = kind;
          oscillator.frequency.setValueAtTime(frequency, context.currentTime + start);
          oscillator.connect(gain);
          gain.connect(master);
          gain.gain.setValueAtTime(volume, context.currentTime + start);
          gain.gain.exponentialRampToValueAtTime(0.001, context.currentTime + start + duration);
          oscillator.start(context.currentTime + start);
          oscillator.stop(context.currentTime + start + duration + 0.02);
        };

        if (type === "good") {
          note(620, 0, 0.08);
          note(840, 0.05, 0.15);
        }
        if (type === "soft") {
          note(380, 0, 0.1);
          note(520, 0.06, 0.08);
        }
        if (type === "bad") {
          note(180, 0, 0.08, "triangle");
          note(130, 0.05, 0.14, "triangle");
        }
        if (type === "push") {
          [220, 260, 310, 360].forEach((frequency, index) => note(frequency, index * 0.04, 0.08, "square", 0.12));
        }
        if (type === "next") {
          note(420, 0, 0.06);
          note(560, 0.05, 0.06);
          note(720, 0.1, 0.1);
        }
      } catch (error) {}
    }

    function App() {
      const [step, setStep] = useState(0);
      const [guidedChoice, setGuidedChoice] = useState(null);

      const [step2Selected, setStep2Selected] = useState(null);
      const [step2WrongPart, setStep2WrongPart] = useState(null);
      const [step2Attempts, setStep2Attempts] = useState(0);
      const [step2Done, setStep2Done] = useState(false);

      const [step3Drag, setStep3Drag] = useState(0);
      const [step3Returning, setStep3Returning] = useState(false);
      const [step3Hint, setStep3Hint] = useState(false);
      const [step3Done, setStep3Done] = useState(false);
      const [step3NucleusTap, setStep3NucleusTap] = useState(0);

      const [step4Pressed, setStep4Pressed] = useState({ left: false, right: false });
      const [step4Motion, setStep4Motion] = useState({ left: false, right: false });
      const [step4Choice, setStep4Choice] = useState(null);
      const [step4Attempts, setStep4Attempts] = useState(0);
      const [step4Done, setStep4Done] = useState(false);
      const [step4ReplayMode, setStep4ReplayMode] = useState(false);

      const [step5Triggered, setStep5Triggered] = useState(false);

      const [step6Choice, setStep6Choice] = useState(null);
      const [step6Revealed, setStep6Revealed] = useState(false);
      const [step6Shifted, setStep6Shifted] = useState(false);
      const [step6Wave, setStep6Wave] = useState(false);

      const [step7Choice, setStep7Choice] = useState(null);

      const [assessment, setAssessment] = useState({
        step1FirstChoice: null,
        step2FirstTap: null,
        step3MaxDrag: 0,
        step4PushCount: 0,
        step4AnswerHistory: [],
        step6Prediction: null
      });

      useEffect(() => {
        window.__EL0_ASSESSMENT__ = assessment;
        try {
          localStorage.setItem("barnapp-el-0-elektroner", JSON.stringify({
            savedAt: Date.now(),
            currentStep: step,
            assessment
          }));
        } catch (error) {}
      }, [assessment, step]);

      const handleNext = () => {
        playSound("next");
        setStep((current) => Math.min(TOTAL_STEPS - 1, current + 1));
      };

      const stepContent = [
        <StepOne
          key="step-1"
          guidedChoice={guidedChoice}
          onChoose={(value) => {
            setGuidedChoice(value);
            setAssessment((current) => ({
              ...current,
              step1FirstChoice: current.step1FirstChoice || value
            }));
            playSound("soft");
          }}
          onNext={handleNext}
        />,
        <StepTwo
          key="step-2"
          selected={step2Selected}
          wrongPart={step2WrongPart}
          attempts={step2Attempts}
          done={step2Done}
          onPick={(part) => {
            setStep2Selected(part);
            setAssessment((current) => ({
              ...current,
              step2FirstTap: current.step2FirstTap || part
            }));

            if (part === "electron") {
              setStep2Done(true);
              setStep2WrongPart(null);
              playSound("good");
              return;
            }

            setStep2Attempts((current) => current + 1);
            setStep2WrongPart(part);
            playSound("bad");
            window.setTimeout(() => setStep2WrongPart(null), 420);
          }}
          onNext={handleNext}
        />,
        <StepThree
          key="step-3"
          drag={step3Drag}
          returning={step3Returning}
          hint={step3Hint}
          done={step3Done}
          nucleusTap={step3NucleusTap}
          setDrag={setStep3Drag}
          setReturning={setStep3Returning}
          setHint={setStep3Hint}
          setDone={setStep3Done}
          setNucleusTap={setStep3NucleusTap}
          updateAssessment={(distance) => {
            setAssessment((current) => ({
              ...current,
              step3MaxDrag: Math.max(current.step3MaxDrag, distance)
            }));
          }}
          onNext={handleNext}
        />,
        <StepFour
          key="step-4"
          pressed={step4Pressed}
          motion={step4Motion}
          choice={step4Choice}
          attempts={step4Attempts}
          done={step4Done}
          replayMode={step4ReplayMode}
          onPush={(side) => {
            if (step4Motion[side]) {
              return;
            }

            setStep4Pressed((current) => ({ ...current, [side]: true }));
            setStep4Motion((current) => ({ ...current, [side]: true }));
            setAssessment((current) => ({
              ...current,
              step4PushCount: current.step4PushCount + 1
            }));
            playSound("push");

            const duration = side === "right" ? 520 : 360;
            window.setTimeout(() => {
              setStep4Motion((current) => ({ ...current, [side]: false }));
            }, duration);
          }}
          onChoose={(value) => {
            setStep4Choice(value);
            setAssessment((current) => ({
              ...current,
              step4AnswerHistory: current.step4AnswerHistory.concat(value)
            }));

            if (value === "right") {
              setStep4Done(true);
              setStep4ReplayMode(true);
              setStep4Motion({ left: true, right: true });
              playSound("good");
              window.setTimeout(() => {
                setStep4Motion({ left: false, right: false });
              }, 620);
              return;
            }

            setStep4Attempts((current) => current + 1);
            setStep4ReplayMode(true);
            setStep4Motion({ left: true, right: true });
            playSound("bad");
            window.setTimeout(() => {
              setStep4Motion({ left: false, right: false });
            }, 620);
          }}
          onNext={handleNext}
        />,
        <StepFive
          key="step-5"
          triggered={step5Triggered}
          onTrigger={() => {
            if (step5Triggered) {
              return;
            }
            setStep5Triggered(true);
            playSound("push");
          }}
          onNext={handleNext}
        />,
        <StepSix
          key="step-6"
          choice={step6Choice}
          revealed={step6Revealed}
          shifted={step6Shifted}
          wave={step6Wave}
          onChoose={(value) => {
            setStep6Choice(value);
            setAssessment((current) => ({
              ...current,
              step6Prediction: current.step6Prediction || value
            }));
            playSound("soft");
          }}
          onReveal={() => {
            if (!step6Choice || step6Revealed) {
              return;
            }
            setStep6Revealed(true);
            setStep6Wave(true);
            setStep6Shifted(false);
            playSound("push");
            window.setTimeout(() => setStep6Shifted(true), 120);
            window.setTimeout(() => setStep6Wave(false), 520);
          }}
          onNext={handleNext}
        />,
        <StepSeven
          key="step-7"
          finalChoice={step7Choice}
          guidedChoice={guidedChoice}
          onChoose={(value) => {
            setStep7Choice(value);
            playSound(value === "electron" ? "good" : "bad");
          }}
        />
      ][step];

      return (
        <main style={{
          minHeight: "100vh",
          padding: "28px 16px 40px",
        }}>
          <div style={{
            maxWidth: 980,
            margin: "0 auto",
            animation: "rise 420ms ease both",
          }}>
            <section style={{
              background: "linear-gradient(180deg, rgba(56, 42, 27, 0.96), rgba(44, 32, 22, 0.98))",
              color: "#fff9ee",
              borderRadius: 34,
              padding: "22px 22px 16px",
              boxShadow: "0 24px 48px rgba(63, 46, 23, 0.22)",
              position: "relative",
              overflow: "hidden",
            }}>
              <div style={{
                position: "absolute",
                inset: 0,
                background: "radial-gradient(circle at 18% 14%, rgba(234, 199, 92, 0.22), transparent 24%), radial-gradient(circle at 86% 20%, rgba(82, 142, 223, 0.22), transparent 20%)",
                pointerEvents: "none",
              }} />

              <div style={{ position: "relative" }}>
                <div style={{
                  display: "inline-flex",
                  alignItems: "center",
                  gap: 10,
                  borderRadius: 999,
                  padding: "10px 14px",
                  background: "rgba(255, 244, 214, 0.1)",
                  color: "#ffe7a5",
                  fontSize: 14,
                  fontWeight: 800,
                  letterSpacing: "0.06em",
                  textTransform: "uppercase",
                }}>
                  <span>El</span>
                  <span aria-hidden="true">•</span>
                  <span>Inuti sladden</span>
                </div>

                <div style={{
                  display: "grid",
                  gap: 18,
                  marginTop: 18,
                }}>
                  <div>
                    <p style={{
                      margin: "0 0 8px",
                      color: "#f7e7c2",
                      fontSize: 15,
                      fontWeight: 800,
                    }}>
                      Idag ser du vad som finns inuti en sladd.
                    </p>
                    <h1 style={{
                      margin: 0,
                      fontSize: "clamp(2rem, 4vw, 3rem)",
                      lineHeight: 1.05,
                    }}>
                      Elektroner på utsidan
                    </h1>
                    <p style={{
                      margin: "12px 0 0",
                      maxWidth: 640,
                      fontSize: 18,
                      lineHeight: 1.6,
                      color: "rgba(255, 248, 235, 0.84)",
                    }}>
                      Du får gissa, trycka, dra och knuffa tills du ser hur små elektroner sitter vid atomens utsida och tar små steg i en kedja.
                    </p>
                  </div>

                  <div style={{
                    display: "grid",
                    gridTemplateColumns: "repeat(auto-fit, minmax(180px, 1fr))",
                    gap: 12,
                  }}>
                    {["Gissa först", "Tryck och dra", "Se små steg"].map((label, index) => (
                      <div key={label} style={{
                        borderRadius: 20,
                        padding: "14px 16px",
                        background: "rgba(255, 249, 233, 0.1)",
                        border: "1px solid rgba(255, 234, 183, 0.16)",
                      }}>
                        <div style={{
                          width: 36,
                          height: 36,
                          borderRadius: "50%",
                          display: "grid",
                          placeItems: "center",
                          background: "rgba(244, 214, 130, 0.16)",
                          marginBottom: 10,
                          fontWeight: 800,
                        }}>
                          {index + 1}
                        </div>
                        <p style={{ margin: 0, fontSize: 16, fontWeight: 700 }}>{label}</p>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            </section>

            <section style={{
              background: "var(--panel)",
              border: "1px solid rgba(146, 109, 57, 0.14)",
              borderRadius: 34,
              marginTop: 16,
              padding: "18px 16px 22px",
              boxShadow: "var(--shadow)",
            }}>
              <Progress step={step} />
              <StepFrame
                step={step}
                onBack={() => setStep((current) => Math.max(0, current - 1))}
              >
                {stepContent}
              </StepFrame>
            </section>
          </div>
        </main>
      );
    }

    function Progress({ step }) {
      return (
        <div style={{
          display: "flex",
          alignItems: "center",
          justifyContent: "space-between",
          gap: 10,
          marginBottom: 18,
          flexWrap: "wrap",
        }}>
          <div style={{ display: "flex", gap: 10, flexWrap: "wrap" }}>
            {Array.from({ length: TOTAL_STEPS }).map((_, index) => {
              const active = index === step;
              const done = index < step;

              return (
                <div key={index} style={{
                  width: active ? 48 : 26,
                  height: 18,
                  borderRadius: 999,
                  background: done
                    ? "linear-gradient(90deg, #6bb788, #4b9164)"
                    : active
                    ? "linear-gradient(90deg, #f2d06f, #d7a72d)"
                    : "rgba(164, 132, 90, 0.16)",
                  animation: active ? "progressPop 220ms ease" : "none",
                  transition: "all 180ms ease",
                }} />
              );
            })}
          </div>

          <div style={{
            fontSize: 15,
            fontWeight: 800,
            color: "var(--muted)",
          }}>
            Steg {step + 1} av {TOTAL_STEPS}
          </div>
        </div>
      );
    }

    function StepFrame({ step, onBack, children }) {
      return (
        <section style={{
          minHeight: 540,
          borderRadius: 28,
          background: "linear-gradient(180deg, rgba(255, 250, 242, 0.9), rgba(252, 245, 232, 0.94))",
          border: "1px solid rgba(154, 118, 72, 0.12)",
          padding: "18px 14px",
        }}>
          <header style={{
            display: "flex",
            justifyContent: "space-between",
            alignItems: "center",
            gap: 12,
            marginBottom: 20,
            flexWrap: "wrap",
          }}>
            <button
              type="button"
              onClick={onBack}
              disabled={step === 0}
              style={{
                minWidth: 104,
                minHeight: 80,
                borderRadius: 22,
                padding: "14px 22px",
                background: step === 0 ? "rgba(174, 146, 109, 0.12)" : "var(--panel-strong)",
                color: step === 0 ? "rgba(111, 98, 86, 0.48)" : "var(--text)",
                border: "1px solid rgba(154, 118, 72, 0.15)",
                fontWeight: 800,
                cursor: step === 0 ? "default" : "pointer",
              }}
            >
              Tillbaka
            </button>

            <div style={{
              display: "inline-flex",
              alignItems: "center",
              gap: 10,
              padding: "8px 12px",
              borderRadius: 999,
              background: "rgba(224, 177, 47, 0.1)",
              color: "var(--gold-deep)",
              fontWeight: 800,
            }}>
              <span aria-hidden="true">⚡</span>
              <span>En sak i taget</span>
            </div>
          </header>

          <div style={{
            borderRadius: 24,
            minHeight: 430,
            padding: 12,
            background: "rgba(255, 252, 246, 0.82)",
            border: "1px dashed rgba(166, 128, 83, 0.2)",
          }}>
            {children}
          </div>
        </section>
      );
    }

    function StepHeading({ eyebrow, title, text }) {
      return (
        <div style={{ marginBottom: 22 }}>
          <p style={{
            margin: "0 0 8px",
            color: "var(--gold-deep)",
            fontSize: 14,
            fontWeight: 800,
            letterSpacing: "0.05em",
            textTransform: "uppercase",
          }}>
            {eyebrow}
          </p>
          <h2 style={{
            margin: 0,
            fontSize: "clamp(1.9rem, 3.2vw, 2.4rem)",
            lineHeight: 1.08,
          }}>
            {title}
          </h2>
          <p style={{
            margin: "12px 0 0",
            maxWidth: 660,
            fontSize: 18,
            lineHeight: 1.65,
            color: "var(--muted)",
          }}>
            {text}
          </p>
        </div>
      );
    }

    function PrimaryButton({ children, onClick, disabled, tone = "gold", full = false }) {
      const styles = {
        gold: {
          background: "linear-gradient(180deg, #f0c95b, #d8a72f)",
          color: "#36290f",
          boxShadow: "0 12px 24px rgba(216, 167, 47, 0.22)"
        },
        soft: {
          background: "linear-gradient(180deg, #e7f0ff, #cdddf9)",
          color: "#264775",
          boxShadow: "0 12px 24px rgba(75, 134, 216, 0.18)"
        }
      };

      return (
        <button
          type="button"
          disabled={disabled}
          onClick={onClick}
          style={{
            minWidth: full ? "100%" : 148,
            minHeight: 80,
            padding: "18px 24px",
            borderRadius: 22,
            fontSize: 18,
            fontWeight: 900,
            border: "none",
            cursor: disabled ? "default" : "pointer",
            opacity: disabled ? 0.45 : 1,
            ...styles[tone]
          }}
        >
          {children}
        </button>
      );
    }

    function FeedbackCard({ tone = "gold", children }) {
      const palette = {
        gold: {
          background: "rgba(246, 232, 187, 0.5)",
          border: "1px solid rgba(195, 156, 55, 0.22)",
          color: "var(--text)"
        },
        blue: {
          background: "rgba(220, 232, 251, 0.7)",
          border: "1px solid rgba(75, 134, 216, 0.2)",
          color: "#28456d"
        },
        green: {
          background: "rgba(221, 239, 225, 0.9)",
          border: "1px solid rgba(63, 140, 90, 0.18)",
          color: "#24543a"
        },
        warn: {
          background: "rgba(248, 229, 212, 0.85)",
          border: "1px solid rgba(192, 107, 47, 0.2)",
          color: "#7c4b23"
        }
      };

      return (
        <div style={{
          borderRadius: 20,
          padding: "15px 18px",
          lineHeight: 1.65,
          fontSize: 17,
          ...palette[tone]
        }}>
          {children}
        </div>
      );
    }

    function ChoicePill({ active, children, onClick }) {
      return (
        <button
          type="button"
          onClick={onClick}
          style={{
            minHeight: 80,
            minWidth: 170,
            padding: "16px 18px",
            borderRadius: 24,
            background: active ? "linear-gradient(180deg, #fff3cd, #f8e3a1)" : "var(--panel-strong)",
            border: active ? "3px solid rgba(224, 177, 47, 0.65)" : "1px solid rgba(154, 118, 72, 0.18)",
            color: "var(--text)",
            fontSize: 18,
            fontWeight: 800,
            boxShadow: active ? "0 16px 26px rgba(216, 167, 47, 0.18)" : "none"
          }}
        >
          {children}
        </button>
      );
    }

    function CableScene() {
      return (
        <div style={{
          borderRadius: 28,
          padding: "18px 18px 10px",
          background: "linear-gradient(180deg, rgba(255, 248, 229, 0.92), rgba(249, 240, 218, 0.84))",
          border: "1px solid rgba(176, 136, 78, 0.16)",
          position: "relative",
          overflow: "hidden",
        }}>
          <div style={{
            display: "flex",
            alignItems: "center",
            justifyContent: "space-between",
            gap: 16,
            flexWrap: "wrap",
          }}>
            <div style={{ minWidth: 160 }}>
              <p style={{
                margin: "0 0 8px",
                fontSize: 14,
                fontWeight: 800,
                textTransform: "uppercase",
                color: "var(--gold-deep)"
              }}>
                Vardagsbild
              </p>
              <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                <div style={{
                  width: 34,
                  height: 52,
                  borderRadius: 12,
                  background: "#f4cf68",
                  position: "relative",
                  boxShadow: "inset 0 -6px 0 rgba(165, 115, 28, 0.2)"
                }}>

    function StepThree({
      drag,
      returning,
      hint,
      done,
      nucleusTap,
      setDrag,
      setReturning,
      setHint,
      setDone,
      setNucleusTap,
      updateAssessment,
      onNext
    }) {
      const dragRef = useRef({ active: false, startX: 0, currentDrag: 0 });

      const pointerDown = (event) => {
        dragRef.current = {
          active: true,
          startX: event.clientX - drag,
          currentDrag: drag
        };
        event.currentTarget.setPointerCapture(event.pointerId);
        setHint(false);
      };

      const pointerMove = (event) => {
        if (!dragRef.current.active) {
          return;
        }
        const nextDrag = clamp(event.clientX - dragRef.current.startX, 0, 60);
        dragRef.current.currentDrag = nextDrag;
        setDrag(nextDrag);
      };

      const finishDrag = (event) => {
        if (!dragRef.current.active) {
          return;
        }

        dragRef.current.active = false;
        if (event.currentTarget.hasPointerCapture(event.pointerId)) {
          event.currentTarget.releasePointerCapture(event.pointerId);
        }

        const finalDistance = clamp(dragRef.current.currentDrag, 0, 60);
        updateAssessment(finalDistance);

        if (finalDistance > 16) {
          setDone(true);
          playSound("soft");
        }

        setReturning(true);
        window.setTimeout(() => setDrag(0), 70);
        window.setTimeout(() => setReturning(false), 460);
      };

      const showHint = () => {
        setHint(true);
        setNucleusTap((current) => current + 1);
        playSound("bad");
      };

                onPointerDown={showHint}
                style={{
                  position: "absolute",

                  top: "50%",
                  transform: "translate(-50%, -50%)",
                  width: 118,
                  height: 118,
                  borderRadius: "50%",
                  background: "transparent"
                }}
                aria-label="Tryck på kärnan"
              />
              <div style={{
                width: 270,
                height: 270,
                margin: "12px auto 0",

                background: "radial-gradient(circle, rgba(255,255,255,0.32), rgba(255,255,255,0) 74%)",
                position: "relative"
              }}>
                <div style={{
                  position: "absolute",
                  left: "50%",
                  top: "50%",
                  width: 116,
                  height: 116,
                  transform: "translate(-50%, -50%)",
                  borderRadius: "50%",
                  background: "radial-gradient(circle at 38% 35%, #f0a36c, #c04d2f 72%)",
                  boxShadow: "0 16px 26px rgba(192, 77, 47, 0.22)",
                  pointerEvents: "none"
                }} />

                <div style={{
                  position: "absolute",
                  right: 44,
                  top: 90,
                  width: 10,
                  height: 10,
                  borderRadius: "50%",
                  background: "rgba(75, 134, 216, 0.52)",
                  boxShadow: hint || done ? "0 0 0 8px rgba(75, 134, 216, 0.1)" : "none",
                  pointerEvents: "none"
                }} />

                <div style={{
                  position: "absolute",

                  top: 128,
                  width: 44 + drag,
                  height: 3,
                  borderRadius: 999,
                  background: done || drag > 0 ? "rgba(75, 134, 216, 0.45)" : "transparent",
                  pointerEvents: "none"

                <div

                  onPointerMove={pointerMove}
                  onPointerUp={finishDrag}
                  onPointerCancel={finishDrag}
                  style={{
                    position: "absolute",
                    right: 36 - drag,

                <div style={{
                  position: "absolute",
                  left: 12,
                  top: 86,
                  width: 70,
                  height: 70,
                  borderRadius: "50%",
                  background: "radial-gradient(circle, rgba(75,134,216,0.24), rgba(75,134,216,0))"
                }} />
              )}

              <div style={{
                display: "flex",
                alignItems: "flex-end",
                justifyContent: "center",
                gap: 16,
                marginTop: 26
              }}>
                {[0, 1].map((index) => (
                  <div key={index} style={{
                    width: 120,
                    textAlign: "center",
                    position: "relative"
                  }}>
                    <div style={{
                      width: 82,
                      height: 46,
                      borderRadius: 999,
                      margin: "0 auto",
                      background: "var(--outer)",
                      border: "1px solid rgba(224, 177, 47, 0.22)",
                      position: "relative"
                    }}>
                      {index === 0 && (
                        <>
                          <div style={{
                            position: "absolute",
                            right: 10,
                            top: "50%",
                            width: 22,
                            height: 22,
                            borderRadius: "50%",
                            transform: `translate(${triggered ? 48 : 0}px, -50%)`,
                            transition: "transform 520ms cubic-bezier(.24,.84,.28,1)",
                            background: "radial-gradient(circle at 38% 38%, #ffe88c, #d8a72f)",
                            boxShadow: "0 0 12px rgba(224, 177, 47, 0.28)"
                          }} />
                          <div style={{
                            position: "absolute",
                            right: 4,
                            top: "50%",
                            width: 20,
                            height: 20,
                            borderRadius: "50%",
                            transform: "translate(48px, -50%)",
                            border: "2px solid rgba(255,255,255,0.92)",
                            background: "rgba(255,255,255,0.26)"
                          }} />
                        </>
                      )}
                      {index === 1 && (
                        <div style={{
                          position: "absolute",
                          right: 10,
                          top: "50%",
                          width: 22,
                          height: 22,
                          borderRadius: "50%",
                          transform: "translate(0, -50%)",
                          background: "radial-gradient(circle at 38% 38%, #ffe88c, #d8a72f)",
                          boxShadow: "0 0 12px rgba(224, 177, 47, 0.28)"
                        }} />
                      )}
                    </div>
                    <div style={{
                      width: 92,
                      height: 92,
                      margin: "-4px auto 0",
                      borderRadius: "50%",
                      background: "radial-gradient(circle at 38% 35%, #f0a36c, #c04d2f 72%)",
                      boxShadow: "0 12px 18px rgba(192, 77, 47, 0.18)"
                    }} />
                  </div>
                ))}
                <div style={{
                  opacity: 0.42,
                  color: "var(--muted)",
                  alignSelf: "center",
                  fontWeight: 800
                }}>
                  • • •
                </div>
              </div>
            </div>

            <div style={{ display: "grid", gap: 14 }}>
              <FeedbackCard tone={triggered ? "green" : "gold"}>
                {triggered
                  ? "Nu ser du det första lilla steget. Något började först när du gav knuffen."
                  : "Kedjan väntar stilla tills du själv trycker på knuffen."}
              </FeedbackCard>
              <div>
                <PrimaryButton onClick={onTrigger} disabled={triggered}>Knuffa</PrimaryButton>
              </div>
              {triggered && (
                <div>
                  <PrimaryButton onClick={onNext}>Se nästa bild</PrimaryButton>
                </div>
              )}
            </div>
          </div>
        </div>
      );
    }

    function PredictionCard({ active, title, mode, onClick, dim }) {
      return (
        <button
          type="button"
          onClick={onClick}
          style={{
            minHeight: 230,
            borderRadius: 28,
            padding: 16,
            textAlign: "left",
            background: active ? "linear-gradient(180deg, #fff5d8, #f8e9b8)" : "var(--panel-strong)",
            border: active ? "3px solid rgba(224, 177, 47, 0.62)" : "1px solid rgba(154, 118, 72, 0.16)",
            opacity: dim ? 0.48 : 1
          }}
        >
          <p style={{ margin: "0 0 14px", fontWeight: 800, fontSize: 18 }}>{title}</p>
          <div style={{
            borderRadius: 22,
            padding: 16,
            background: "rgba(255, 252, 245, 0.8)",
            border: "1px solid rgba(154, 118, 72, 0.12)"
          }}>
            {mode === "one" ? (
              <div style={{
                display: "flex",
                alignItems: "center",
                gap: 10,
                justifyContent: "center",
                minHeight: 110
              }}>
                <div style={{
                  width: 26,
                  height: 26,
                  borderRadius: "50%",
                  background: "radial-gradient(circle at 38% 38%, #ffe88c, #d8a72f)"
                }} />
                <div style={{
                  flex: 1,
                  height: 6,
                  borderRadius: 999,
                  background: "linear-gradient(90deg, rgba(75,134,216,0.18), rgba(75,134,216,0.6))"
                }} />
                <div style={{
                  width: 0,
                  height: 0,
                  borderTop: "10px solid transparent",
                  borderBottom: "10px solid transparent",
                  borderLeft: "18px solid rgba(75,134,216,0.8)"
                }} />
              </div>
            ) : (
              <div style={{
                display: "flex",
                justifyContent: "center",
                gap: 10,
                minHeight: 110,
                alignItems: "center"
              }}>
                {[0, 1, 2, 3].map((index) => (
                  <div key={index} style={{ position: "relative", width: 34, height: 50 }}>
                    <div style={{
                      position: "absolute",
                      left: 0,
                      top: "50%",
                      width: 20,
                      height: 20,
                      borderRadius: "50%",
                      transform: "translateY(-50%)",
                      background: "radial-gradient(circle at 38% 38%, #ffe88c, #d8a72f)"
                    }} />
                    <div style={{
                      position: "absolute",
                      left: 18,
                      top: "50%",
                      width: 14,
                      height: 14,
                      borderRadius: "50%",
                      transform: "translateY(-50%)",
                      border: "2px solid rgba(255,255,255,0.92)",
                      background: "rgba(255,255,255,0.24)"
                    }} />
                  </div>
                ))}
              </div>
            )}
          </div>
        </button>
      );
    }

    function SimultaneousChain({ shifted, wave }) {
      return (
        <div style={{
          borderRadius: 28,
          padding: "22px 18px",
          background: "linear-gradient(180deg, rgba(255, 251, 240, 0.96), rgba(246, 237, 215, 0.9))",
          border: "1px solid rgba(154, 118, 72, 0.16)",
          position: "relative",
          overflow: "hidden"
        }}>
          {wave && (
            <div style={{
              position: "absolute",
              left: 6,
              top: "50%",
              width: 68,
              height: 68,
              borderRadius: "50%",
              transform: "translateY(-50%)",
              background: "radial-gradient(circle, rgba(75,134,216,0.28), rgba(75,134,216,0))"
            }} />
          )}
          <div style={{
            display: "flex",
            alignItems: "flex-end",
            justifyContent: "center",
            gap: 14,
            position: "relative"
          }}>
            {Array.from({ length: 4 }).map((_, index) => (
              <div key={index} style={{
                width: 92,
                position: "relative",
                textAlign: "center"
              }}>
                <div style={{
                  width: 82,
                  height: 46,
                  borderRadius: 999,
                  margin: "0 auto",
                  background: "var(--outer)",
                  border: "1px solid rgba(224, 177, 47, 0.22)",
                  position: "relative"
                }}>
                  <div style={{
                    position: "absolute",
                    right: 10,
                    top: "50%",
                    width: 22,
                    height: 22,
                    borderRadius: "50%",
                    transform: `translate(${shifted ? 48 : 0}px, -50%)`,
                    transition: "transform 560ms cubic-bezier(.21,.86,.22,1)",
                    background: "radial-gradient(circle at 38% 38%, #ffe88c, #d8a72f)",
                    boxShadow: "0 0 12px rgba(224, 177, 47, 0.28)"
                  }} />
                  <div style={{
                    position: "absolute",
                    right: 4,
                    top: "50%",
                    width: 20,
                    height: 20,
                    borderRadius: "50%",
                    transform: "translate(48px, -50%)",
                    border: "2px solid rgba(255,255,255,0.92)",
                    background: "rgba(255,255,255,0.26)"
                  }} />
                </div>
                <div style={{
                  width: 92,
                  height: 92,
                  margin: "-4px auto 0",
                  borderRadius: "50%",
                  background: "radial-gradient(circle at 38% 35%, #f0a36c, #c04d2f 72%)",
                  boxShadow: "0 12px 18px rgba(192, 77, 47, 0.18)"
                }} />
              </div>
            ))}
          </div>
        </div>
      );
    }

    function StepSix({ choice, revealed, shifted, wave, onChoose, onReveal, onNext }) {
      const correct = choice === "all";

      return (
        <div>
          <StepHeading
            eyebrow="Steg 6"
            title="Vad tror du händer?"
            text="Välj en bild först. Sedan ser du vad som verkligen händer i kedjan."
          />

          <div style={{
            display: "grid",
            gridTemplateColumns: "repeat(auto-fit, minmax(250px, 1fr))",
            gap: 16
          }}>
            <PredictionCard
              title="En åker långt"
              mode="one"
              active={choice === "one"}
              dim={revealed && correct}
              onClick={() => onChoose("one")}
            />
            <PredictionCard
              title="Alla flyttar sig ett steg"
              mode="all"
              active={choice === "all"}
              dim={revealed && !correct}
              onClick={() => onChoose("all")}
            />
          </div>

          <div style={{
            display: "grid",
            gap: 14,
            marginTop: 18
          }}>
            <div>
              <PrimaryButton onClick={onReveal} disabled={!choice || revealed}>
                Se vad som händer
              </PrimaryButton>
            </div>

            {revealed && (
              <>
                <SimultaneousChain shifted={shifted} wave={wave} />
                <FeedbackCard tone={correct ? "green" : "blue"}>
                  {correct
                    ? "Alla flyttar sig ett steg samtidigt. Ingen åker hela vägen."
                    : "Titta – inte bara en prick rör sig. Alla prickar tar ett litet steg var."}
                </FeedbackCard>
                <div>
                  <PrimaryButton onClick={onNext}>Jag såg det</PrimaryButton>
                </div>
              </>
            )}
          </div>
        </div>
      );
    }

    function FinalChoiceCard({ active, kind, onClick, dim }) {
      return (
        <button
          type="button"
          onClick={onClick}
          style={{
            minHeight: 190,
            borderRadius: 28,
            padding: 16,
            textAlign: "center",
            background: active ? "linear-gradient(180deg, #fff5d8, #f8e9b8)" : "var(--panel-strong)",
            border: active ? "3px solid rgba(224, 177, 47, 0.62)" : "1px solid rgba(154, 118, 72, 0.16)",
            opacity: dim ? 0.52 : 1
          }}
        >
          <div style={{
            minHeight: 104,
            display: "grid",
            placeItems: "center"
          }}>
            {kind === "electron" && (
              <div style={{
                width: 130,
                height: 88,
                position: "relative"
              }}>
                <div style={{
                  position: "absolute",
                  left: 18,
                  top: 16,
                  width: 56,
                  height: 56,
                  borderRadius: "50%",
                  background: "radial-gradient(circle at 38% 35%, #f0a36c, #c04d2f 72%)"
                }} />
                <div style={{
                  position: "absolute",
                  inset: 0,
                  borderRadius: 999,
                  border: "10px solid rgba(255, 224, 143, 0.34)"
                }} />
                <div style={{
                  position: "absolute",
                  right: 18,
                  top: 26,
                  width: 30,
                  height: 30,
                  borderRadius: "50%",
                  background: "radial-gradient(circle at 38% 38%, #ffe88c, #d8a72f)"
                }} />
              </div>
            )}
            {kind === "lightning" && (
              <div style={{
                fontSize: 80,
                lineHeight: 1
              }}>
                ⚡
              </div>
            )}
            {kind === "battery" && (
              <div style={{
                width: 92,
                height: 126,
                borderRadius: 18,
                background: "linear-gradient(180deg, #76c071, #4e9b57)",
                position: "relative",
                boxShadow: "inset 0 -10px 0 rgba(22, 66, 34, 0.12)"
              }}>
                <div style={{
                  position: "absolute",
                  left: "50%",
                  top: -12,
                  transform: "translateX(-50%)",
                  width: 26,
                  height: 18,
                  borderRadius: 10,
                  background: "#6d6d6d"
                }} />
                <div style={{
                  position: "absolute",
                  inset: 0,
                  display: "grid",
                  placeItems: "center",
                  color: "#effae9",
                  fontWeight: 900,
                  fontSize: 36
                }}>
                  +
                </div>
              </div>
            )}
          </div>
          <p style={{ margin: 0, fontWeight: 800, fontSize: 18 }}>
            {kind === "electron" ? "Gul prick vid atom" : kind === "lightning" ? "Blixt" : "Batteri"}
          </p>
        </button>
      );
    }

    function StepSeven({ finalChoice, guidedChoice, onChoose }) {
      const pickedCorrect = finalChoice === "electron";
      const actualLooseSide = "right";

      return (
        <div>
          <StepHeading
            eyebrow="Steg 7"
            title="Det här lärde du dig"
            text="Elektronen sitter på utsidan. Vissa material håller fast elektronen hårdare. I vissa kedjor kan alla ta små steg. Vilken bild visar en elektron?"
          />

          <div style={{
            display: "grid",
            gap: 18
          }}>
            <div style={{
              display: "grid",
              gridTemplateColumns: "repeat(auto-fit, minmax(180px, 1fr))",
              gap: 12
            }}>
              {[
                "Elektronen sitter på utsidan",
                "Vissa material håller fast elektronen hårdare",
                "Alla kan ta små steg"
              ].map((text) => (
                <div key={text} style={{
                  borderRadius: 24,
                  padding: "16px 18px",
                  background: "var(--panel-strong)",
                  border: "1px solid rgba(154, 118, 72, 0.16)",
                  fontWeight: 800,
                  lineHeight: 1.55
                }}>
                  {text}
                </div>
              ))}
            </div>

            <div style={{
              display: "grid",
              gridTemplateColumns: "repeat(auto-fit, minmax(220px, 1fr))",
              gap: 14
            }}>
              {[
                { id: "left", label: guidedChoice === "left" ? "Du gissade på den här först" : "Kedja" },
                { id: "right", label: actualLooseSide === "right" ? "Här satt elektronerna lösare" : "Kedja" }
              ].map((item) => (
                <div key={item.id} style={{
                  borderRadius: 26,
                  padding: 14,
                  background: item.id === guidedChoice || item.id === actualLooseSide
                    ? "linear-gradient(180deg, rgba(255, 250, 233, 0.96), rgba(245, 234, 203, 0.88))"
                    : "var(--panel-strong)",
                  border: item.id === actualLooseSide
                    ? "2px solid rgba(224, 177, 47, 0.42)"
                    : "1px solid rgba(154, 118, 72, 0.14)"
                }}>
                  <p style={{ margin: "0 0 12px", fontWeight: 800 }}>{item.label}</p>
                  <MaterialChain loose={item.id === "right"} compact highlight={item.id === actualLooseSide} />
                </div>
              ))}
            </div>

            <div style={{
              display: "grid",
              gridTemplateColumns: "repeat(auto-fit, minmax(220px, 1fr))",
              gap: 14
            }}>
              {["electron", "lightning", "battery"].map((kind) => (
                <FinalChoiceCard
                  key={kind}
                  kind={kind}
                  active={finalChoice === kind || (kind === "electron" && (pickedCorrect || finalChoice === "lightning" || finalChoice === "battery"))}
                  dim={!!finalChoice && kind !== "electron" && !pickedCorrect}
                  onClick={() => onChoose(kind)}
                />
              ))}
            </div>

            {finalChoice && (
              <FeedbackCard tone={pickedCorrect ? "green" : "blue"}>
                {pickedCorrect
                  ? "Ja. Elektronen är den gula pricken vid atomen. Nästa gång får du testa i vilka riktiga material elektroner lätt kan ta små steg."
                  : "Blixten och batteriet visar inte elektronen. Titta på den gula pricken vid atomen."}
              </FeedbackCard>
            )}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
