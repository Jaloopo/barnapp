# Övningsindex — Barnapp
# Varje entry representerar en app. Opus läser detta för att föreslå vägar.
#
# Fält:
#   id:            unik identifierare (mappar till docs/[ämne]/[id]/)
#   ämne:          ämneskategori
#   titel:         kort beskrivning
#   ålder:         målgrupp
#   koncept:       vad appen lär ut (lista)
#   prerequisites: vilka andra appar som bör göras först (lista av id)
#   unlocks:       vilka appar som blir möjliga efter denna (lista av id)
#   status:        design | byggd | testad | klar

appar:
  - id: kemi-1-atomer
    ämne: kemi
    titel: Atomer och grundämnen — protoner bestämmer ämnet
    ålder: 8-9
    koncept:
      - atomer
      - protoner
      - grundämnen
      - periodiska systemet (intro)
    prerequisites: []
    unlocks:
      - kemi-2-molekyler
      - fysik-1-gravitation
      - el-0-elektroner
    status: klar

  - id: kemi-2-molekyler
    ämne: kemi
    titel: Molekyler — atomer som sätter ihop sig
    ålder: 8-9
    koncept:
      - molekyler
      - atomer binder ihop sig
      - nya egenskaper
    prerequisites:
      - kemi-1-atomer
    unlocks:
      - astro-1-fusion
      - kemi-3-blandningar
    status: klar

  - id: el-0-elektroner
    ämne: el
    titel: Elektronerna som rör sig — vad är ström?
    ålder: 8-9
    koncept:
      - elektroner kretsar runt kärnan
      - yttre elektroner kan hoppa mellan atomer
      - ström är elektroner som vandrar
    prerequisites:
      - kemi-1-atomer
    unlocks:
      - el-1-ledare
    status: planerad

  - id: el-1-ledare
    ämne: el
    titel: Ledare och isolatorer — kan elektronen hoppa?
    ålder: 8-9
    koncept:
      - elektrisk ström
      - ledare
      - isolator
    prerequisites:
      - el-0-elektroner
    unlocks:
      - el-2-kretsar
    status: byggd

  - id: el-2-kretsar
    ämne: el
    titel: Spänning — vad driver strömmen?
    ålder: 8-9
    koncept:
      - spänning
      - kretsar
      - batteri
    prerequisites:
      - el-1-ledare
    unlocks: []
    status: byggd

  - id: fysik-1-gravitation
    ämne: fysik
    titel: Allt drar i allt — gravitation
    ålder: 8-9
    koncept:
      - gravitation som dragningskraft
      - mer massa ger starkare dragning
      - gravitation formar stjärnor och planeter
    prerequisites:
      - kemi-1-atomer
    unlocks:
      - astro-1-fusion
    status: design

  - id: astro-1-fusion
    ämne: astro
    titel: Stjärnköket — väte blir helium genom fusion
    ålder: 8-9
    koncept:
      - fusion
      - väte och helium
      - stjärnors energikälla
      - solen är en stjärna
    prerequisites:
      - kemi-1-atomer
      - fysik-1-gravitation
    unlocks:
      - astro-2-livscykel
    status: byggd
